    - userRatingCount
    - regularOpeningHours
    - googleMapsUri
  public_page_keywords:
    - check
    - arrival
    - departure
    - faq
    - kontakt
    - contact
    - reception
    - recepcia
    - opening
    - hours
    - hotel
  copy_disciplines:
    give_first: true
    one_email_one_goal: true
    low_friction_cta_only: true
    relevance_over_cleverness: true
    human_tone_only: true
    ai_for_small_components_only: true
